<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
{% if post %}
Update Blog
{% else %}
Create New Blog
{% endif %}
</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{

    min-height:100vh;

    background:linear-gradient(135deg,#eff6ff,#dbeafe,#f8fafc);

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;
}

.container{

    width:100%;
    max-width:900px;

    background:white;

    border-radius:18px;

    box-shadow:
    0 15px 40px rgba(0,0,0,.08);

    overflow:hidden;

}

.header{

    background:linear-gradient(135deg,#2563eb,#1e40af);

    color:white;

    padding:35px;

}

.header h1{

    font-size:2rem;
    margin-bottom:8px;

}

.header p{

    opacity:.9;

}

.content{

    padding:35px;

}

label{

    display:block;

    font-weight:600;

    margin-bottom:10px;

    color:#334155;

}

input{

    width:100%;

    padding:16px;

    font-size:17px;

    border:1px solid #cbd5e1;

    border-radius:10px;

    outline:none;

    transition:.3s;

    margin-bottom:25px;

}

textarea{

    width:100%;

    min-height:350px;

    resize:vertical;

    padding:16px;

    font-size:17px;

    border-radius:10px;

    border:1px solid #cbd5e1;

    outline:none;

    transition:.3s;

    line-height:1.8;

}

input:focus,
textarea:focus{

    border-color:#2563eb;

    box-shadow:0 0 0 4px rgba(37,99,235,.15);

}

.buttons{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-top:30px;

    flex-wrap:wrap;

    gap:15px;

}

.back{

    text-decoration:none;

    background:#f1f5f9;

    color:#1e293b;

    padding:14px 24px;

    border-radius:10px;

    font-weight:600;

    transition:.3s;

}

.back:hover{

    background:#e2e8f0;

}

.save{

    border:none;

    cursor:pointer;

    background:#2563eb;

    color:white;

    padding:15px 40px;

    font-size:17px;

    border-radius:10px;

    font-weight:bold;

    transition:.3s;

}

.save:hover{

    background:#1d4ed8;

    transform:translateY(-2px);

    box-shadow:0 10px 20px rgba(37,99,235,.25);

}

.footer{

    margin-top:15px;

    color:#64748b;

    font-size:14px;

}

@media(max-width:768px){

.header{

    padding:25px;

}

.content{

    padding:20px;

}

.header h1{

    font-size:1.5rem;

}

textarea{

    min-height:220px;

}

.buttons{

    flex-direction:column-reverse;

}

.save,.back{

    width:100%;
    text-align:center;

}

}

</style>

</head>
<body>

<div class="container">

<div class="header">

<h1>

{% if post %}
 Update Blog
{% else %}
 Write a New Blog
{% endif %}

</h1>

<p>
Share your thoughts, ideas, and stories with the world.
</p>

</div>

<div class="content">

<form method="POST">

{% csrf_token %}

<label>Blog Title</label>

<input
type="text"
name="title"
placeholder="Enter an attractive blog title..."
value="{{ post.title|default:'' }}"
required
>

<label>Blog Content</label>

<textarea
name="content"
placeholder="Start writing your amazing blog here..."
required>{{ post.content|default:'' }}</textarea>

<div class="footer">

Write meaningful content that people love to read.

</div>

<div class="buttons">

<a href="/" class="back">
← Back to Home
</a>

<button class="save" type="submit">

{% if post %}
 Update Blog
{% else %}
 Publish Blog
{% endif %}

</button>

</div>

</form>

</div>

</div>

</body>
</html>
